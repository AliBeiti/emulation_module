---
# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: ksense

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ksense-usage-api
  namespace: ksense
  labels:
    app: ksense-usage-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ksense-usage-api
  template:
    metadata:
      labels:
        app: ksense-usage-api
    spec:
      serviceAccountName: ksense-usage-api

      # hostNetwork: true — pod shares the node's network namespace
      # This allows localhost:26657 inside the pod to reach cometbft
      # on the node, and also allows correct ContainerLab IP detection
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
        - name: emulation-module
          image: alibeiti/emulation-module:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            # Transaction module URL — localhost works because hostNetwork: true
            - name: TRANSACTION_API_URL
              value: "http://localhost:26657/abci_query?data=%22tx%22"

            # SELLER_NODE_IP is intentionally NOT set here
            # transaction_poller.py auto-detects the 10.0.x.x interface IP
            # using the UDP socket trick at startup

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

---
# ── Service ───────────────────────────────────────────────────────────────────
# Admission Control connects via ClusterIP DNS (unchanged):
#   http://ksense-usage-api.ksense.svc:8090/usage/latest
#
# Trading module / buyer node connects via NodePort:
#   http://<seller-node-IP>:30090/transaction
#   http://<seller-node-IP>:30090/usage/latest
apiVersion: v1
kind: Service
metadata:
  name: ksense-usage-api
  namespace: ksense
  labels:
    app: ksense-usage-api
spec:
  selector:
    app: ksense-usage-api
  ports:
    - name: api
      port: 8090
      targetPort: 8090
      nodePort: 30090
      protocol: TCP
  type: NodePort

---
# ── ServiceAccount + RBAC ─────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ksense-usage-api
  namespace: ksense

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ksense-usage-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ksense-usage-api
    namespace: ksense